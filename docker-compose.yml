services:
  webui:
    build:
      context: .
      dockerfile: Dockerfile
    image: image-scoring:latest
    container_name: image-scoring-webui
    ports:
      - "7860:7860"
    environment:
      - DOCKER_CONTAINER=1
      - WEBUI_HOST=0.0.0.0
      - FIREBIRD_WIN_DB_PATH=D:/Projects/image-scoring-backend/SCORING_HISTORY.FDB
      - FIREBIRD_CLIENT_LIBRARY=/app/FirebirdLinux/Firebird-5.0.0.1306-0-linux-x64/opt/firebird/lib/libfbclient.so
    volumes:
      - .:/app
      # Mount Windows drives for image file access (add more as needed)
      - "D:/:/mnt/d"
    # Make GPU usage work with non-Swarm `docker compose`
    gpus: all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
