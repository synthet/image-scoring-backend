services:
  db:
    image: pgvector/pgvector:pg17
    container_name: image-scoring-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=image_scoring
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  webui:
    build:
      context: .
      dockerfile: Dockerfile
    image: image-scoring:latest
    container_name: image-scoring-webui
    ports:
      - "7860:7860"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DOCKER_CONTAINER=1
      - WEBUI_HOST=0.0.0.0
      # FDB at repo root when `.:/app` is mounted (set FIREBIRD_WIN_DB_PATH in `.env` to override)
      - FIREBIRD_WIN_DB_PATH=/app/SCORING_HISTORY.FDB
      - FIREBIRD_CLIENT_LIBRARY=/app/FirebirdLinux/Firebird-5.0.0.1306-0-linux-x64/opt/firebird/lib/libfbclient.so
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=image_scoring
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - .:/app
      # Optional: add `- "${WSL_DRIVE_MOUNT}:/mnt/d"` when you need a Windows drive under `/mnt/d` (set `WSL_DRIVE_MOUNT` in `.env`, e.g. your drive root with forward slashes).
    # Make GPU usage work with non-Swarm `docker compose`
    gpus: all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

volumes:
  postgres_data:
