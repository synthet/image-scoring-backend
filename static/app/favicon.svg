  <circle cx="32" cy="42" r="3.2" fill="#fff"/>
  <!-- Star below gauge -->
  <path fill="#fff" d="M32 46.2l1.05 2.15 2.35.35-1.7 1.65.4 2.35-2.1-1.1-2.1 1.1.4-2.35-1.7-1.65 2.35-.35z"/>
