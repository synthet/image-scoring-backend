<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Image Scoring">
  <defs>
    <linearGradient id="fav-bg" x1="4" y1="4" x2="60" y2="60" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1a9fff"/>
      <stop offset="1" stop-color="#ff3d9a"/>
    </linearGradient>
  </defs>
  <rect x="3" y="3" width="58" height="58" rx="14" fill="url(#fav-bg)" stroke="#fff" stroke-opacity="0.35" stroke-width="1"/>
  <!-- Outer gauge arc (upper semicircle) -->
