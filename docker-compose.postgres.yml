version: '3.8'

services:
  db:
    image: ankane/pgvector:latest
    container_name: image-scoring-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=image_scoring
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
