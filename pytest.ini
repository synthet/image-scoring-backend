[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Standard ignores for Windows to prevent collection errors and skip problematic scripts
norecursedirs = 
    FirebirdLinux 
    scripts/python 
    .git 
    .venv 
    .venv_wsl 
    docs 
    static 
    temp_test_* 
    *.FDB 
    *.fdb


markers =
    gpu: tests that require a GPU
    db: tests that require a database connection
    ml: tests that require machine learning dependencies (TF, PyTorch, pyiqa, etc.)
    wsl: Tests intended to be run in WSL/Linux
    network: Tests that require outbound network access
    sample_data: Tests that require local sample files
    firebird: Tests that require Firebird database/client libraries
