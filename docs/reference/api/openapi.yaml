          description: If True, force re-clustering even when folder was already clustered.
          default: false
        exclude_image_paths:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Exclude Image Paths
          description: Optional image paths to exclude from resolved selector targets.
      type: object
      title: PipelineSubmitRequest
      description: "Request model for submitting images/folders to the processing pipeline.\n\nChains requested StageRuns\
        \ sequentially (indexing/metadata/score/tag/cluster).\n\nAttributes:\n    workspace_target: File or directory path\
        \ to process.\n    stage_codes: Ordered stage run codes to execute (indexing|metadata|score|tag|cluster).\n    workflow_template:\
        \ Logical template name for the run (e.g., full_ingest, metadata_only, re_tag)."
