  /api/tagging/start:
    post:
      tags:
      - Tagging
      summary: Start batch tagging
      description: "Initiates a batch image tagging job using CLIP (Contrastive Language-Image Pre-Training).\n        \n\
        \        The tagging process:\n        - Extracts relevant keywords from images using zero-shot classification\n \
        \       - Optionally generates captions using BLIP (Bootstrapping Language-Image Pre-training)\n        - Writes metadata\
        \ to XMP sidecar files and embedded metadata\n        - Updates database with keywords, title, and description\n \
        \       \n        **Keyword Extraction:**\n        - Uses default keyword set if custom_keywords not provided\n  \
        \      - Default keywords: landscape, portrait, urban, cityscape, nature, wildlife, etc.\n        - Returns top 5\
        \ most relevant keywords per image\n        \n        **Caption Generation:**\n        - Enabled with generate_captions=True\n\
        \        - Uses BLIP model to generate natural language descriptions\n        - Title is auto-generated from caption\
        \ (first 50 chars)\n        \n        **Path Handling:**\n        - Provide input_path and/or selectors (image_ids,\
        \ image_paths, folder_ids, folder_paths)\n        - Directory path processes images in that folder and subfolders\n\
        \        - Paths are automatically converted between Windows/WSL formats\n        \n        The job runs asynchronously.\
        \ Use GET /api/tagging/status to monitor progress."
      operationId: start_tagging_api_tagging_start_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaggingStartRequest'
        required: true
      responses:
        '200':
          description: Tagging job start confirmation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: Bad Request - Invalid input parameters
