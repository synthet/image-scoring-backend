components:
  schemas:
    ApiResponse:
      properties:
        success:
          type: boolean
          title: Success
          description: True if operation succeeded, False otherwise.
          example: true
        message:
          type: string
          title: Message
          description: Human-readable message describing the result.
          example: Scoring job started successfully
        data:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Data
          description: Optional dictionary with additional result data (e.g., job_id, file_path).
          example:
            input_path: D:/Photos/2024
            job_id: 123
      type: object
      required:
      - success
      - message
      title: ApiResponse
      description: "Standard API response model for operation results.\n\nUsed for all operation endpoints (start, stop, etc.)\
        \ to provide consistent\nsuccess/failure feedback.\n\nAttributes:\n    success: True if operation succeeded, False\
        \ otherwise.\n    message: Human-readable message describing the result.\n    data: Optional dictionary with additional\
        \ result data (e.g., job_id, file_path).\n\nExample:\n    {\n        \"success\": true,\n        \"message\": \"Scoring\
        \ job started successfully\",\n        \"data\": {\"job_id\": 123, \"input_path\": \"D:/Photos/2024\"}\n    }"
      example:
        data:
          job_id: 123
        message: Operation completed successfully
        success: true
    BirdSpeciesStartRequest:
      properties:
        image_ids:
          anyOf:
          - items:
              type: integer
            type: array
          - type: 'null'
          title: Image Ids
          description: Specific image IDs to process.
          example:
          - 101
          - 102
        image_paths:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Image Paths
          description: Specific image file paths to process.
          example:
          - D:/Photos/2024/img001.jpg
        folder_ids:
          anyOf:
          - items:
              type: integer
            type: array
          - type: 'null'
          title: Folder Ids
          description: Folder IDs to process.
          example:
          - 12
        folder_paths:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Folder Paths
          description: Folder paths to process.
          example:
          - D:/Photos/2024
        recursive:
          type: boolean
          title: Recursive
          description: If True, include subfolders when folder selectors are used.
          default: true
          example: true
        input_path:
          anyOf:
          - type: string
          - type: 'null'
          title: Input Path
          description: Directory path containing images to classify.
          example: D:/Photos/2024
        candidate_species:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Candidate Species
          description: List of common species names to classify against. If None, uses the bundled North American species
            list.
          example:
          - American Robin
          - Northern Cardinal
          - Mallard
        threshold:
          type: number
          title: Threshold
          description: Minimum softmax probability to store a species prediction.
          default: 0.1
          example: 0.1
        top_k:
          type: integer
          title: Top K
          description: Maximum number of species to store per image.
          default: 3
          example: 3
        overwrite:
          type: boolean
          title: Overwrite
          description: 'If True, re-classify images that already have species: keywords.'
          default: false
          example: false
      type: object
      title: BirdSpeciesStartRequest
      description: "Request model for starting a bird species classification job.\n\nOnly images that already have the 'birds'\
        \ keyword are processed â€” all others are\nautomatically skipped. Top predicted species are stored as 'species:Common\
        \ Name'\nkeywords using BioCLIP 2 (zero-shot, MIT license).\n\nExample:\n    {\n        \"input_path\": \"D:/Photos/2024\"\
        ,\n        \"threshold\": 0.1,\n        \"top_k\": 3,\n        \"overwrite\": false\n    }"
      example:
        input_path: D:/Photos/2024
        overwrite: false
        threshold: 0.1
        top_k: 3
    Body_clear_stacks_api_db_stacks_clear_post:
      properties:
        folder_id:
          type: integer
          title: Folder Id
      type: object
      required:
      - folder_id
      title: Body_clear_stacks_api_db_stacks_clear_post
    ClusteringStartRequest:
      properties:
        image_ids:
          anyOf:
          - items:
              type: integer
            type: array
          - type: 'null'
          title: Image Ids
          description: Specific image IDs to process.
          example:
          - 101
          - 102
        image_paths:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Image Paths
          description: Specific image file paths to process.
          example:
          - D:/Photos/2024/img001.jpg
        folder_ids:
          anyOf:
          - items:
              type: integer
            type: array
          - type: 'null'
          title: Folder Ids
          description: Folder IDs to process.
          example:
          - 12
        folder_paths:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Folder Paths
          description: Folder paths to process.
          example:
          - D:/Photos/2024
        recursive:
          type: boolean
          title: Recursive
          description: If True, include subfolders when folder selectors are used.
          default: true
          example: true
        input_path:
          anyOf:
          - type: string
          - type: 'null'
          title: Input Path
          description: Directory path containing images to cluster. None clusters all unprocessed.
          example: D:/Photos/2024
        threshold:
          anyOf:
          - type: number
          - type: 'null'
          title: Threshold
          description: Distance threshold for clustering (lower = stricter).
          example: 0.15
        time_gap:
          anyOf:
          - type: integer
          - type: 'null'
          title: Time Gap
          description: Time gap in seconds for burst grouping.
          example: 5
        force_rescan:
          type: boolean
          title: Force Rescan
          description: If True, re-cluster folders even if already processed.
          default: false
          example: false
      type: object
      title: ClusteringStartRequest
      description: "Request model for starting a clustering job.\n\nClusters images in a folder based on visual similarity\
        \ and temporal proximity.\n\nAttributes:\n    input_path: Directory path containing images to cluster. If empty, clusters\
        \ all unprocessed folders.\n    threshold: Distance threshold for clustering (lower = stricter grouping).\n    time_gap:\
        \ Time gap in seconds for burst grouping.\n    force_rescan: If True, re-cluster even if already processed."
    DbQueryRequest:
