          example: D:/Photos/2024/image.jpg
      type: object
      required:
      - file_path
      title: SingleImageRequest
      description: "Request model for single image operations.\n\nUsed for scoring or fixing metadata for a single image file.\n\
        \nAttributes:\n    file_path: Full path to the image file. Supports Windows and WSL paths.\n\nExample:\n    {\n  \
        \      \"file_path\": \"D:/Photos/2024/image.jpg\"\n    }"
      example:
        file_path: D:/Photos/2024/image.jpg
    StatusResponse:
      properties:
        is_running:
          type: boolean
          title: Is Running
          description: True if job is currently running, False if idle or completed.
          example: true
        status_message:
          type: string
          title: Status Message
          description: Human-readable status message (e.g., 'Running...', 'Idle', 'Done').
          example: Running...
        progress:
          additionalProperties:
            type: integer
          type: object
          title: Progress
          description: Dictionary with 'current' and 'total' counts of processed items.
          example:
            current: 45
            total: 100
        log:
          type: string
          title: Log
          description: Full log output from the job. May be truncated for very long logs.
          example: 'Starting batch processing...

            Processing image 1...'
        job_type:
          anyOf:
          - type: string
          - type: 'null'
          title: Job Type
          description: 'Type of job: ''scoring'', ''fix_db'', ''tagging'', or None if idle.'
          example: scoring
      type: object
      required:
      - is_running
      - status_message
      - progress
      - log
