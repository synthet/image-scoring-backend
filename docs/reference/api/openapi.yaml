          example:
          - indexing
          - metadata
          - score
        workflow_template:
          type: string
          title: Workflow Template
          description: WorkflowTemplate identifier that produced this stage sequence.
          default: custom
          example: full_ingest
        skip_existing:
          type: boolean
          title: Skip Existing
          description: Skip images that already have results for each operation.
          default: true
          example: true
        custom_keywords:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Custom Keywords
          description: Custom keywords for tagging (if 'tag' is in stage_codes).
        generate_captions:
          type: boolean
          title: Generate Captions
          description: Generate captions during tagging.
          default: false
          example: false
        clustering_threshold:
          anyOf:
          - type: number
          - type: 'null'
          title: Clustering Threshold
          description: Distance threshold for clustering (if 'cluster' is in stage_codes).
        clustering_time_gap:
          anyOf:
          - type: integer
          - type: 'null'
          title: Clustering Time Gap
          description: Time gap in seconds for clustering burst grouping (if 'cluster' is in stage_codes).
        clustering_force_rescan:
          type: boolean
