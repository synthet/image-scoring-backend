  /api/scoring/start:
    post:
      tags:
      - Scoring
      summary: Start batch image scoring
      description: "Initiates a batch image quality assessment job for all images in the specified directory.\n        \n\
        \        The scoring process uses multiple AI models to evaluate images:\n        - **SPAQ**: Spatial Perception of\
        \ Aesthetic Quality\n        - **AVA**: Aesthetic Visual Analysis\n        - **KonIQ**: Konstanz Image Quality\n \
        \       - **PaQ2PiQ**: Perceptual Quality to Perceptual Image Quality\n        - **LIQE**: Learning Image Quality\
        \ Evaluator\n        \n        Results include:\n        - Technical score (sharpness, noise, exposure)\n        -\
        \ Aesthetic score (composition, appeal)\n        - General quality score (weighted combination)\n        - Rating\
        \ (1-5 stars) and color label (Red/Yellow/Green/Blue/Purple)\n        \n        The job runs asynchronously. Use GET\
        \ /api/scoring/status to monitor progress.\n        \n        **Path Handling:**\n        - Windows paths: `D:/Photos/2024`\
        \ or `D:\\Photos\\2024`\n        - WSL paths: `/mnt/d/Photos/2024`\n        - Paths are automatically converted between\
        \ formats when needed\n        \n        **Skip Logic:**\n        - If `skip_existing=True`: Images with complete\
        \ scores are skipped\n        - If `force_rescore=True`: All images are re-scored regardless of existing data\n  \
        \      - Incomplete scores (missing models or metadata) are always completed\n        \n        **Example Request:**\n\
        \        ```json\n        {\n            \"input_path\": \"D:/Photos/2024\",\n            \"skip_existing\": true,\n\
        \            \"force_rescore\": false\n        }\n        ```\n        \n        **Example Response:**\n        ```json\n\
        \        {\n            \"success\": true,\n            \"message\": \"Scoring job started successfully\",\n     \
        \       \"data\": {\n                \"job_id\": 123,\n                \"input_path\": \"D:/Photos/2024\"\n      \
        \      }\n        }\n        ```"
      operationId: start_scoring_api_scoring_start_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScoringStartRequest'
        required: true
      responses:
        '200':
          description: Job started successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                success: true
                message: Scoring job started successfully
                data:
                  job_id: 123
                  input_path: D:/Photos/2024
        '400':
          description: Invalid input path or path not found
        '404':
          description: Not Found - Resource not found
        '500':
          description: Internal Server Error
        '503':
          description: Scoring runner not available
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
