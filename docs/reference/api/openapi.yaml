        \ If True, generate image captions using BLIP model. Default: False.\n\nExample:\n    {\n        \"input_path\": \"\
        D:/Photos/2024\",\n        \"custom_keywords\": [\"landscape\", \"sunset\", \"nature\"],\n        \"overwrite\": false,\n\
