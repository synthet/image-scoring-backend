      description: "Response model for job status information.\n\nProvides real-time status of running or completed jobs including\
        \ progress,\nlogs, and current state.\n\nAttributes:\n    is_running: True if job is currently running, False if idle\
        \ or completed.\n    status_message: Human-readable status message (e.g., \"Running...\", \"Idle\", \"Done\").\n \
        \   progress: Dictionary with \"current\" and \"total\" counts of processed items.\n    log: Full log output from\
        \ the job (may be truncated for long logs).\n    job_type: Type of job: \"scoring\", \"fix_db\", \"tagging\", or None\
        \ if idle.\n\nExample:\n    {\n        \"is_running\": true,\n        \"status_message\": \"Running...\",\n      \
        \  \"progress\": {\"current\": 45, \"total\": 100},\n        \"log\": \"Starting batch processing...\\nProcessing\
        \ image 1...\",\n        \"job_type\": \"scoring\"\n    }"
      example:
        is_running: true
        job_type: scoring
        log: 'Starting batch processing...

          Processing image 1...'
        progress:
          current: 45
          total: 100
        status_message: Running...
    TagPropagationRequest:
      properties:
        folder_path:
          anyOf:
          - type: string
          - type: 'null'
          title: Folder Path
          description: Optional directory path to restrict propagation to.
          example: D:/Photos/2024
        dry_run:
          type: boolean
          title: Dry Run
          description: If True, only returns candidates without writing to database.
          default: true
          example: true
        k:
          anyOf:
          - type: integer
          - type: 'null'
          title: K
          description: Number of nearest neighbors to consider.
          example: 5
        min_similarity:
          anyOf:
          - type: number
          - type: 'null'
          title: Min Similarity
          description: Minimum cosine similarity to consider a neighbor.
          example: 0.85
        min_keyword_confidence:
          anyOf:
          - type: number
          - type: 'null'
          title: Min Keyword Confidence
          description: Minimum confidence score to apply a keyword.
          example: 0.6
        min_support_neighbors:
          anyOf:
          - type: integer
          - type: 'null'
          title: Min Support Neighbors
          description: Minimum number of neighbors that must have the keyword.
          example: 2
        write_mode:
          anyOf:
          - type: string
          - type: 'null'
          title: Write Mode
          description: '''replace_missing_only'' (default) or ''append''.'
          default: replace_missing_only
          example: replace_missing_only
        max_keywords:
          anyOf:
          - type: integer
          - type: 'null'
          title: Max Keywords
          description: Maximum keywords to propagate per image.
          example: 10
        focus_image_id:
          anyOf:
          - type: integer
          - type: 'null'
          title: Focus Image Id
          description: When set with dry_run=True, include propagation preview for this image even if it already has keywords.
            Suggested keywords exclude ones already on the image.
      type: object
      title: TagPropagationRequest
      description: "Request model for tag propagation.\n\nPropagates keywords from tagged images to visually similar untagged\
        \ images.\n\nAttributes:\n    folder_path: Optional directory path to restrict propagation to.\n    dry_run: If True,\
        \ only returns candidates without writing to database. Default: True.\n    k: Number of nearest neighbors to consider.\n\
        \    min_similarity: Minimum cosine similarity to consider a neighbor.\n    min_keyword_confidence: Minimum confidence\
        \ score to apply a keyword.\n    min_support_neighbors: Minimum number of neighbors that must have the keyword.\n\
        \    write_mode: 'replace_missing_only' (default) or 'append'.\n    max_keywords: Maximum keywords to propagate per\
        \ image."
      example:
        dry_run: true
        folder_path: D:/Photos/2024
        k: 5
        min_similarity: 0.85
