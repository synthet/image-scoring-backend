  /api/clustering/start:
    post:
      tags:
      - Clustering
      summary: Start clustering job
      description: "Starts a clustering job that groups visually similar images into stacks.\n\n        Uses MobileNetV2 embeddings\
        \ and cosine similarity to find groups of related images.\n        Optionally uses EXIF timestamps for burst detection.\n\
        \n        The job runs asynchronously. Use GET /api/clustering/status to monitor progress."
      operationId: start_clustering_api_clustering_start_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClusteringStartRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: Bad Request - Invalid input parameters
        '404':
