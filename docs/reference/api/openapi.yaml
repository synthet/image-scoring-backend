    ScoringStartRequest:
      properties:
        image_ids:
          anyOf:
          - items:
              type: integer
            type: array
          - type: 'null'
          title: Image Ids
          description: Specific image IDs to process.
          example:
          - 101
          - 102
        image_paths:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Image Paths
          description: Specific image file paths to process.
          example:
          - D:/Photos/2024/img001.jpg
        folder_ids:
          anyOf:
          - items:
              type: integer
            type: array
          - type: 'null'
          title: Folder Ids
          description: Folder IDs to process.
          example:
          - 12
        folder_paths:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Folder Paths
          description: Folder paths to process.
          example:
          - D:/Photos/2024
        recursive:
          type: boolean
          title: Recursive
          description: If True, include subfolders when folder selectors are used.
          default: true
          example: true
        input_path:
          anyOf:
          - type: string
          - type: 'null'
          title: Input Path
          description: Directory path containing images to score. Supports Windows (D:\...) and WSL (/mnt/...) paths.
          example: D:/Photos/2024
        skip_existing:
          type: boolean
          title: Skip Existing
          description: If True, skip images that already have complete scores. Set to False to force re-scoring.
          default: true
