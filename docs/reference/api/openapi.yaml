  /api/embedding_map:
    get:
      tags:
      - Utilities
      summary: 2D embedding map
      description: "Project image embeddings to 2D coordinates for spatial visualisation.\n\n        Uses UMAP (default) or\
        \ t-SNE to reduce 1280-d MobileNetV2 embeddings to\n        two dimensions.  Results are cached on disk; pass `refresh=true`\
        \ to force\n        recomputation.\n\n        **Query Parameters:**\n        - folder_path: Optional.  Scope projection\
        \ to one folder; omit for all images.\n        - method: `umap` (default) or `tsne`.\n        - refresh: If true,\
        \ ignore the on-disk cache and recompute.\n        - sample_limit: Cap the number of images projected (default: config\
        \ `embedding_map.max_points`).\n        - n_neighbors: UMAP/t-SNE neighbourhood size (default: 30).\n        - min_dist:\
        \ UMAP min_dist (default: 0.1, ignored for t-SNE).\n\n        **Returns:**\n        - points: List of `{image_id,\
        \ x, y, file_path, thumbnail_path, label, rating, score_general}`.\n        - meta: `{count, method, computed_at,\
        \ cache_key}`.\n          When too few images are available `meta.error == \"too_few_points\"` and\n          `points`\
        \ is empty."
      operationId: get_embedding_map_api_embedding_map_get
      parameters:
      - name: folder_path
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Scope to folder path
          title: Folder Path
        description: Scope to folder path
      - name: method
        in: query
        required: false
        schema:
          type: string
          description: 'Projection method: umap or tsne'
          default: umap
          title: Method
        description: 'Projection method: umap or tsne'
      - name: refresh
        in: query
        required: false
        schema:
          type: boolean
          description: Force recomputation, ignoring cache
          default: false
          title: Refresh
        description: Force recomputation, ignoring cache
      - name: sample_limit
        in: query
        required: false
        schema:
          anyOf:
          - type: integer
            maximum: 50000
            minimum: 1
          - type: 'null'
          description: Max images to project
          title: Sample Limit
        description: Max images to project
      - name: n_neighbors
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 2
          description: UMAP/t-SNE neighbourhood size
          default: 30
          title: N Neighbors
        description: UMAP/t-SNE neighbourhood size
      - name: min_dist
        in: query
        required: false
        schema:
          type: number
          maximum: 1.0
          minimum: 0.0
          description: UMAP min_dist parameter
          default: 0.1
          title: Min Dist
        description: UMAP min_dist parameter
