openapi: 3.0.3
info:
  title: Image Scoring WebUI API
  description: REST API for image quality assessment, tagging, clustering, and data queries.
  version: 6.3.1
servers:
- url: http://127.0.0.1:7860
  description: Local development
tags:
- name: Scoring
- name: Tagging
- name: Clustering
- name: Bird Species
- name: Images
- name: Folders
- name: Stacks
- name: Jobs
- name: Runs
- name: Pipeline
- name: Similarity
- name: Scope
- name: Queue
- name: Import
- name: Gallery
- name: Config
- name: Database
- name: Debug
- name: General
- name: Utilities
paths:
  /api/bird-species/start:
    post:
      tags:
      - Bird Species
      summary: Start bird species classification
      description: "Classify bird species for images that already have the 'birds' keyword.\n\n        Images **without**\
        \ the 'birds' keyword are automatically skipped â€” no need to\n        pre-filter. Top predictions are stored as\
        \ 'species:Common Name' keywords using\n        BioCLIP 2 (zero-shot, MIT license).\n\n        The job runs asynchronously\
        \ via the job queue. Monitor progress with\n        GET /api/bird-species/status.\n\n        **Requires:** `open_clip_torch`\
        \ installed (`pip install open_clip_torch`)."
      operationId: start_bird_species_api_bird_species_start_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BirdSpeciesStartRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: Bad Request - Invalid input parameters
        '404':
          description: Not Found - Resource not found
        '500':
          description: Internal Server Error
        '503':
          description: Service Unavailable - Runner not initialized
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/bird-species/status:
    get:
      tags:
      - Bird Species
      summary: Get bird species status
      description: Get the current status of the bird species classification runner.
      operationId: get_bird_species_status_api_bird_species_status_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '400':
          description: Bad Request - Invalid input parameters
        '404':
          description: Not Found - Resource not found
        '500':
          description: Internal Server Error
        '503':
          description: Service Unavailable - Runner not initialized
  /api/bird-species/stop:
    post:
      tags:
      - Bird Species
      summary: Stop bird species job
      description: Send a stop signal to the running bird species classification job.
      operationId: stop_bird_species_api_bird_species_stop_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: Bad Request - Invalid input parameters
        '404':
          description: Not Found - Resource not found
