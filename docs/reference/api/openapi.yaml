      title: ScoringStartRequest
      description: "Request model for starting a batch image scoring job.\n\nThis endpoint initiates quality assessment of\
        \ images using multiple AI models\n(SPAQ, AVA, KonIQ, PaQ2PiQ, LIQE) to generate technical, aesthetic, and general\
        \ quality scores.\n\nAttributes:\n    input_path: Directory path containing images to score. Supports Windows (D:\\\
        ...)\n               and WSL (/mnt/...) paths. Required.\n    skip_existing: If True, skip images that already have\
        \ complete scores in database. \n                  Default: True. Set to False to force re-scoring.\n    force_rescore:\
        \ If True, overwrite existing scores even if complete. \n                  Takes precedence over skip_existing. Default:\
        \ False.\n\nExample:\n    {\n        \"input_path\": \"D:/Photos/2024\",\n        \"skip_existing\": true,\n     \
        \   \"force_rescore\": false\n    }"
      example:
        force_rescore: false
        input_path: D:/Photos/2024
        skip_existing: true
    SingleImageRequest:
      properties:
